version: 0.1.0
language: ko
license: MIT
default_config: ko_native_v0_1

configs:
  translated_v2:
    split: test
    path: data/translated_v2/test.jsonl
    questions: 100
    description: Korean translation of the BullshitBench v2 question set
  ko_native_v0_1:
    split: test
    path: data/ko_native_v0_1/test.jsonl
